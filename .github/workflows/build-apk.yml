name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Install Vulkan shader compiler and curl
        run: sudo apt-get update && sudo apt-get install -y glslang-tools curl

      - name: Download prebuilt llama-server
        run: |
          # Use the same download logic as Gradle build
          JNIDIR=app/src/main/jniLibs/arm64-v8a
          mkdir -p $JNIDIR

          curl -L -o /tmp/llama-android.tar.gz "https://github.com/ggml-org/llama.cpp/releases/download/b9754/llama-b9754-bin-android-arm64.tar.gz"
          tar -xzf /tmp/llama-android.tar.gz -C /tmp

          # Find and copy llama-server binary
          find /tmp -name 'llama-server' -type f -executable | head -1 | xargs -I {} cp {} $JNIDIR/libllama_server.so

          # Find and copy all .so files
          find /tmp -name '*.so' -type f | xargs -I {} cp {} $JNIDIR/

          # Make llama-server executable
          chmod +x $JNIDIR/libllama_server.so

          echo "Bundled files:"
          ls -lh $JNIDIR/

      - name: Setup NDK for Gradle
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_HOME" >> $GITHUB_ENV

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Clean project
        run: ./gradlew clean

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk