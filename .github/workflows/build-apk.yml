name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y glslang-tools curl zipalign apksigner

      - name: Download prebuilt llama-server
        run: |
          JNIDIR=app/src/main/jniLibs/arm64-v8a
          mkdir -p $JNIDIR
          curl -L -o /tmp/llama-android.tar.gz "https://github.com/ggml-org/llama.cpp/releases/download/b9754/llama-b9754-bin-android-arm64.tar.gz"
          tar -xzf /tmp/llama-android.tar.gz -C /tmp
          find /tmp -name 'llama-server' -type f -executable | head -1 | xargs -I {} cp {} $JNIDIR/libllama_server.so
          find /tmp -name '*.so' -type f | xargs -I {} cp {} $JNIDIR/
          chmod +x $JNIDIR/libllama_server.so
          echo "Bundled files:"; ls -lh $JNIDIR/

      - name: Setup NDK for Gradle
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_HOME" >> $GITHUB_ENV

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Clean & Build Debug APK
        run: ./gradlew clean assembleDebug --stacktrace

      - name: Sign APK
        run: |
          # Generate keystore
          keytool -genkey -v \
            -keystore /tmp/devhive.jks \
            -alias devhive \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass devhive2024 -keypass devhive2024 \
            -dname "CN=DevHive IDE, O=DevHive, C=EG"

          SRC=app/build/outputs/apk/debug/app-debug.apk
          SIGNED=app/build/outputs/apk/debug/DevHive-IDE-signed.apk

          # Align
          zipalign -v -p 4 "$SRC" /tmp/apk-aligned.apk

          # Sign
          apksigner sign \
            --ks /tmp/devhive.jks \
            --ks-pass pass:devhive2024 \
            --key-pass pass:devhive2024 \
            --ks-key-alias devhive \
            --out "$SIGNED" \
            /tmp/apk-aligned.apk

          # Verify
          apksigner verify --verbose "$SIGNED"
          echo "✅ Signed successfully"
          ls -lh "$SIGNED"

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: DevHive-IDE-signed
          path: app/build/outputs/apk/debug/DevHive-IDE-signed.apk
          retention-days: 90
