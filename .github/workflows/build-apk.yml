name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Install Vulkan shader compiler
        run: sudo apt-get update && sudo apt-get install -y glslang-tools

      - name: Cross-compile llama.cpp with Vulkan for Android
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          git clone --depth 1 --branch b9754 https://github.com/ggml-org/llama.cpp /tmp/llama-src
          cd /tmp/llama-src

          # Find glslc or glslangValidator
          GLSLC_PATH=$(which glslc 2>/dev/null || which glslangValidator 2>/dev/null || echo "")

          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_VULKAN=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_OPENMP=OFF

          cmake --build build --target llama-server -j$(nproc) || {
            echo "::warning::Vulkan build failed, falling back to CPU-only build"
            rm -rf build
            cmake -B build \
              -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
              -DANDROID_ABI=arm64-v8a \
              -DANDROID_PLATFORM=android-28 \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_SHARED_LIBS=ON \
              -DGGML_OPENMP=OFF
            cmake --build build --target llama-server -j$(nproc)
          }

          echo "Build complete. Listing output:"
          find build -name '*.so' -o -name 'llama-server' | head -40

      - name: Bundle llama-server into jniLibs
        run: |
          JNIDIR=app/src/main/jniLibs/arm64-v8a
          mkdir -p $JNIDIR

          # Copy the server binary
          cp /tmp/llama-src/build/bin/llama-server $JNIDIR/libllama_server.so
          chmod +x $JNIDIR/libllama_server.so

          # Copy all shared libraries
          find /tmp/llama-src/build -name 'lib*.so' -exec cp {} $JNIDIR/ \;

          echo "Bundled files:"
          ls -lh $JNIDIR/

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Clean project
        run: ./gradlew clean

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk