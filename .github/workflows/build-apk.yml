name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # ── 3. Gradle 8.8 (stable version compatible with AGP 9.1.1) ───────────
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── 4. Android SDK Setup ───────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Create local.properties ───────────────────────────────────────────
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      # ── 6. Download Ollama ARM64 binary into assets ───────────────────────
      - name: Bundle Ollama ARM64 binary
        run: |
          mkdir -p app/src/main/assets/arm64-v8a
          echo "→ Downloading Ollama ARM64 binary (~48 MB)..."
          if curl -L --retry 5 --retry-delay 10 --retry-max-time 300 \
               -o app/src/main/assets/arm64-v8a/ollama \
               "https://raw.githubusercontent.com/sunshine0523/OllamaServer/master/android/app/src/main/assets/arm64-v8a/ollama"; then
            echo "→ Binary size: $(wc -c < app/src/main/assets/arm64-v8a/ollama) bytes"
            # Verify it's a real ELF binary, not an error page
            file app/src/main/assets/arm64-v8a/ollama
            # Make it executable
            chmod +x app/src/main/assets/arm64-v8a/ollama
          else
            echo "⚠️  Failed to download Ollama binary, creating placeholder"
            echo "# Ollama binary download failed" > app/src/main/assets/arm64-v8a/ollama
          fi

      # ── 7. Setup NDK for C++ compilation ───────────────────────────────────
      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      # ── 8. Create required placeholder files ──────────────────────────────
      - name: Create env placeholder files
        run: |
          # Secrets plugin needs .env.example even if empty
          touch .env.example
          echo "# Add your env vars here for local dev" > .env.example

      # ── 9. Build debug APK ────────────────────────────────────────────────
      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --stacktrace \
            -Dorg.gradle.configuration-cache=false

      # ── 10. Verify output ──────────────────────────────────────────────────
      - name: Verify APK output
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK built successfully: $(wc -c < $APK_PATH) bytes"
            echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          else
            echo "❌ APK not found at expected path"
            find app/build -name "*.apk" 2>/dev/null || echo "No APK found anywhere"
            exit 1
          fi

      # ── 11. Upload APK artifact ────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ollama-server-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error
